  <style>
    /* ===== All your existing CSS completely unchanged ===== */
    .news-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    .news-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .news-header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
    .news-header p {
      font-size: 1.2rem;
      color: var(--text-light);
    }
    .news-filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-btn {
      padding: 0.75rem 1.5rem;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: var(--primary);
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }
    .news-card {
      background: var(--bg-glass);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 1rem;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .news-card:hover {
      transform: translateY(-10px);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.2);
    }
    .news-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      object-fit: cover;
    }
    .news-content {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .news-category {
      display: inline-block;
      background: rgba(139, 92, 246, 0.2);
      color: var(--primary);
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      width: fit-content;
    }
    .news-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .news-description {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      flex: 1;
      line-height: 1.5;
    }
    .news-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid rgba(139, 92, 246, 0.1);
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .news-source {
      font-weight: 600;
      color: var(--accent);
    }
    .news-link {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin-top: 1rem;
    }
    .news-link:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
    }
    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-light);
    }
    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 1.5rem;
      border-radius: 1rem;
      text-align: center;
      margin: 2rem 0;
    }
    .load-more-btn {
      display: block;
      margin: 2rem auto;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .load-more-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
    }
    @media (max-width: 768px) {
      .news-header h1 {
        font-size: 2rem;
      }
      .news-grid {
        grid-template-columns: 1fr;
      }
      .news-filters {
        flex-direction: column;
      }
      .filter-btn {
        width: 100%;
      }
    }
  </style>

  <!-- News Section -->
  <div class="news-container">
    <div class="news-header">
      <h1>Global Financial News</h1>
      <p>Stay informed with real-time news from around the world</p>
    </div>

    <div class="news-filters">
      <button class="filter-btn active" onclick="filterNews('finance')">Finance</button>
      <button class="filter-btn" onclick="filterNews('business')">Business</button>
      <button class="filter-btn" onclick="filterNews('tech')">Technology</button>
      <button class="filter-btn" onclick="filterNews('economy')">Economy</button>
      <button class="filter-btn" onclick="filterNews('all')">All News</button>
    </div>

    <div id="news-container" class="news-grid">
      <div class="loading">Loading latest news</div>
    </div>

    <button class="load-more-btn" onclick="loadMoreNews()" style="display: none;" id="load-more">Load More News</button>
  </div>

  <!-- Footer -->
  <footer class="footer" style="margin-top: 4rem;">

  </footer>

  <script src="js/main.js"></script>
  <script src="js/share.js"></script>
  <script>
    let currentPage = 1;
    let currentKeyword = 'finance';
    let allArticles = [];

    // Mapping categories to trusted financial RSS feeds (via rss2json)
    const RSS_FEEDS = {
      finance: [
        'https://feeds.marketwatch.com/marketwatch/topstories/',
        'https://www.cnbc.com/id/100003114/device/rss/rss.html'
      ],
      business: [
        'https://feeds.bloomberg.com/markets/news.rss',
        'https://feeds.reuters.com/reuters/businessNews'
      ],
      tech: [
        'https://feeds.feedburner.com/venturebeat/SZYF',
        'https://www.techrepublic.com/rssfeeds/topic/tech-industry/'
      ],
      economy: [
        'https://feeds.reuters.com/reuters/businessNews',
        'https://www.economist.com/finance-and-economics/rss.xml'
      ],
      all: [
        'https://feeds.marketwatch.com/marketwatch/topstories/',
        'https://www.cnbc.com/id/100003114/device/rss/rss.html',
        'https://feeds.bloomberg.com/markets/news.rss',
        'https://feeds.reuters.com/reuters/businessNews'
      ]
    };

    // Helper: fetch a single RSS feed via rss2json
    async function fetchRSSFeed(url) {
      const rss2jsonApi = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
      const response = await fetch(rss2jsonApi);
      if (!response.ok) throw new Error('RSS fetch failed');
      const data = await response.json();
      if (data.status !== 'ok') throw new Error('RSS parse error');
      return data.items;
    }

    // Fetch all feeds for a category and merge articles
    async function fetchNews(keyword = 'finance', page = 1) {
      const container = document.getElementById('news-container');
      if (page === 1) {
        container.innerHTML = '<div class="loading">Loading latest news</div>';
      }

      let articles = [];
      const feeds = RSS_FEEDS[keyword] || RSS_FEEDS.all;

      // Fetch all feeds concurrently
      const feedPromises = feeds.map(feed => fetchRSSFeed(feed).catch(() => []));
      const results = await Promise.all(feedPromises);

      // Flatten and deduplicate by link
      articles = results.flat();
      const seenLinks = new Set();
      articles = articles.filter(article => {
        if (seenLinks.has(article.link)) return false;
        seenLinks.add(article.link);
        return article.title && article.link;
      });

      if (articles.length === 0) {
        container.innerHTML = '<div class="error-message">No news articles found. Showing featured news instead.</div>';
        articles = generateMockNews(keyword).articles;
      }

      // Sort by date (most recent first)
      articles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

      // Paginate (10 per page)
      const perPage = 10;
      const start = (page - 1) * perPage;
      const paginatedArticles = articles.slice(start, start + perPage);

      if (page === 1) {
        allArticles = articles; // store all articles for "load more"
        container.innerHTML = '';
      } else {
        // For load more, just append the new slice
        // We already have all articles, just display the next page's worth
        const startAll = (page - 1) * perPage;
        const endAll = startAll + perPage;
        const appendArticles = allArticles.slice(startAll, endAll);
        appendArticles.forEach(article => {
          const card = createNewsCard(article);
          container.appendChild(card);
        });
        document.getElementById('load-more').style.display = endAll < allArticles.length ? 'block' : 'none';
        return;
      }

      paginatedArticles.forEach(article => {
        const card = createNewsCard(article);
        container.appendChild(card);
      });

      document.getElementById('load-more').style.display = articles.length > perPage ? 'block' : 'none';
    }

    function createNewsCard(article) {
      const card = document.createElement('div');
      card.className = 'news-card';

      const title = article.title || 'News Update';
      const description = article.description || article.content || article.summary || 'Read full story';
      
      // Use article thumbnail or a reliable placeholder
      let image = article.thumbnail || article.enclosure?.link || null;
      if (!image || image === 'null' || image === '') {
        image = getPlaceholderImage(currentKeyword);
      }

      const source = article.author || extractSourceFromLink(article.link) || 'Global News';
      const date = article.pubDate || new Date().toISOString();
      const url = article.link || '#';

      const formattedDate = new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });

      card.innerHTML = `
        <img src="${image}" alt="${title}" class="news-image" 
             onerror="this.onerror=null; this.src='${getPlaceholderImage(currentKeyword)}';" 
             loading="lazy">
        <div class="news-content">
          <div class="news-category">${currentKeyword}</div>
          <h3 class="news-title">${title}</h3>
          <p class="news-description">${description.substring(0, 120)}${description.length > 120 ? '...' : ''}</p>
          <div class="news-meta">
            <span class="news-source">${source}</span>
            <span>${formattedDate}</span>
          </div>
          <a href="${url}" target="_blank" rel="noopener noreferrer" class="news-link">Read Full Story →</a>
        </div>
      `;
      return card;
    }

    // Simple source extraction from domain
    function extractSourceFromLink(url) {
      try {
        const domain = new URL(url).hostname.replace('www.', '');
        return domain.split('.')[0];
      } catch {
        return 'News';
      }
    }

    function getPlaceholderImage(category) {
      const base = 'https://picsum.photos';
      const seed = Math.floor(Math.random() * 1000);
      return `${base}/400/200?random=${seed}`;
    }

    function filterNews(keyword) {
      currentKeyword = keyword;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      fetchNews(keyword, 1);
    }

    function loadMoreNews() {
      currentPage++;
      fetchNews(currentKeyword, currentPage);
    }

    function generateMockNews(keyword) {
      const mockArticles = [
        {
          title: `Global ${keyword.charAt(0).toUpperCase() + keyword.slice(1)} Markets Rally on Positive Economic Data`,
          description: `Stock markets around the world surged today following strong economic indicators.`,
          image: getPlaceholderImage('finance'),
          source: 'Financial Times',
          pubDate: new Date(Date.now() - 1000 * 60 * 60 * 2).toISOString(),
          link: 'https://www.ft.com'
        },
        {
          title: `Tech Companies Drive ${keyword.charAt(0).toUpperCase() + keyword.slice(1)} Sector Higher`,
          description: `Leading technology companies pushed the market higher as investors flock to growth stocks.`,
          image: getPlaceholderImage('tech'),
          source: 'Reuters',
          pubDate: new Date(Date.now() - 1000 * 60 * 60 * 5).toISOString(),
          link: 'https://www.reuters.com'
        },
        {
          title: `Central Banks Signal Continued Support for Economic Recovery`,
          description: `Global central banks reinforced their commitment to supporting economic growth.`,
          image: getPlaceholderImage('economy'),
          source: 'Bloomberg',
          pubDate: new Date(Date.now() - 1000 * 60 * 60 * 12).toISOString(),
          link: 'https://www.bloomberg.com'
        }
      ];
      return { articles: mockArticles };
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
      fetchNews('finance', 1);
    });
  </script>
</body>
